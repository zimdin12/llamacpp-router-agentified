# =============================================================================
# Sub-service Docker Compose Template
# =============================================================================
# To add a sub-service (e.g., openmemory, llama-cpp, qdrant):
#
# 1. Create a directory: services/<service-name>/
# 2. Copy this file to: services/<service-name>/docker-compose.yml
# 3. Customize the service definition below
# 4. Include it in the main compose via the include-services.sh script
#    or by using: docker compose -f docker-compose.yml -f services/<name>/docker-compose.yml up
#
# The sub-service joins the parent's network automatically.

services:
  # Rename this to your service name
  sub-service:
    image: your-image:latest
    # Or build from source:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-aify}-sub-service
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${SUB_SERVICE_PORT:-9000}:9000"
    volumes:
      - sub-service-data:/data
    environment:
      - EXAMPLE_VAR=value
    networks:
      - service-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  sub-service-data:
    name: ${COMPOSE_PROJECT_NAME:-aify}-sub-service-data

networks:
  service-network:
    # Reference the parent network (created by main docker-compose.yml)
    external: true
    name: ${COMPOSE_PROJECT_NAME:-aify}-network
