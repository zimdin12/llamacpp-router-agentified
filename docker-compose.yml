# =============================================================================
# aify-llamacpp-router — Ollama-like LLM router
# =============================================================================
# Manages aify-llamacpp sub-containers, one per model.
# Set MODELS env var to select which models to serve.
# All stacks share aify-network for cross-service communication.

services:
  router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-llamacpp-router}-service
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${SERVICE_PORT:-11434}:11434"
    volumes:
      - ${DATA_VOLUME_NAME:-llamacpp-router-data}:/data
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - SERVICE_PORT=11434
      - DATA_DIR=/data
      - MODELS=${MODELS:-glm-4.7-flash,qwen3-embedding-0.6b}
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2}"
          memory: ${MEMORY_LIMIT:-2g}
    networks:
      - aify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  llamacpp-router-data:
    name: ${DATA_VOLUME_NAME:-llamacpp-router-data}

networks:
  aify-network:
    name: aify-network
    external: true
